# configs/nih_chestxray.yaml
# Task 1.2 §5.3 / Task 1.3 §2.4 — NIH ChestX-ray14 (Localization Subset)
#
# REPLACES CheXpert — CheXpert has no spatial GT annotations (no bounding
# boxes or segmentation masks), making it incompatible with localization
# metrics L1–L4.  NIH ChestX-ray14 provides GT bounding boxes for 8 pathology
# classes in BBox_List_2017.csv (984-image localization subset).
#
# Full fine-tune; 14 pathology labels (8 have GT bounding boxes).
# Use per-class metric reporting due to severe class imbalance.

dataset:        nih_chestxray
num_classes:    14
num_epochs:     30
warmup_epochs:  5

# Optimiser (§5.1)
base_lr:        1.0e-4
batch_size:     256
weight_decay:   0.05

# Augmentation (§5.4)
# color_jitter reduced: images are grayscale (converted to 3-ch RGB by replication)
input_size:     224
color_jitter:   0.1          # reduced for X-ray (greyscale→RGB replicated)
rand_augment:   rand-m9-n2-mstd0.5-inc1
re_prob:        0.25
re_mode:        pixel
re_count:       1
interpolation:  bicubic
mixup_alpha:    0.8
cutmix_alpha:   0.0          # Disabled — Mixup only
label_smoothing: 0.1

# Class imbalance
# pos_weight[c] = (N - N_pos_c) / N_pos_c  — computed dynamically from train set.
# BCEWithLogitsLoss is used instead of CrossEntropyLoss (multi-label pathology).
class_weighted_loss: true    # triggers BCEWithLogitsLoss in training.loss.build_loss()

# Localization evaluation — only the BBox subset (984 images, 8 classes)
# GT file: BBox_List_2017.csv
# Evaluation: box-level IoU + pointing game (NOT pixel IoU — no masks available)
localization_gt:   BBox_List_2017.csv
localization_classes:
  - Atelectasis
  - Cardiomegaly
  - Effusion
  - Infiltrate
  - Mass
  - Nodule
  - Pneumonia
  - Pneumothorax

# Image loading note
# Images are grayscale PNG (1024×1024).  Always call .convert('RGB') before
# passing to any model — this replicates the single channel across R, G, B.
grayscale_to_rgb: true

# Misc
dropout:        0.0
stochastic_depth: 0.1
amp:            true
num_workers:    8
accum_steps:    1
